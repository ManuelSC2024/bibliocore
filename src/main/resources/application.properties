spring.application.name=bibliocore

# Configuración de credenciales
# Para Railway spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
# Para localhost spring.datasource.url=jdbc:mysql://localhost:3306/bibliocore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bibliocore_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:abc123..}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de JWT el secreto y la duración del token
# El secreto tener por lo menos 32 caracteres
# El expiration está en milisegundos (36000000 ms = 10 horas)
jwt.secret=${JWT_SECRET:ClaveSecretadeBibliocoreParaJwtSeguro2026}
jwt.expiration=36000000

app.base-url=${APP_BASE_URL:http://10.0.2.2:8080}